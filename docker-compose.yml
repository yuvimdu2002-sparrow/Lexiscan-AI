version: "3.8"

services:
  lexiscan-api:
    build: .
    container_name: lexiscan_auto_api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MODEL_PATH=/app/models/lexiscan_bilstm_ner.h5
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - lexiscan-api
    restart: unless-stopped
